    <meta charset="UTF-8">

<body class="page-main">
    <a href="../">&larr; Back to the Main Raspberry Pi Page</a>

    <h1>Traffic Light Simulator</h1>

    <!-- Hardware Checklist -->
    <div style="margin-bottom: 25px;">
        <h3 style="margin-bottom: 12px; border-bottom: 2px solid #333; padding-bottom: 4px; display: inline-block;">Hardware I used on Breadboard:</h3>
        
        <!-- Buzzer Section -->
        <div style="margin-bottom: 20px;">
            <strong><a href="../../../../assets/images/raspberry-pi/buzzer.png" target="_blank" rel="noopener">Active buzzer</a></strong> (1)            
            <ul style="list-style: none; padding-left: 0; margin: 6px 0 0 0;">
                <li style="margin-bottom: 4px;">
                    <input type="checkbox" id="hw-buzzer-wires" style="margin-right: 8px;">
                    <label for="hw-buzzer-wires"><a href="../../../../assets/images/raspberry-pi/male-to-female-jump-wire.png" target="_blank" rel="noopener">Male to Female jumper wires</a> (2: 1 ground, 1 signal)</label>
                </li>
            </ul>
        </div>

        <!-- Button Section -->
        <div style="margin-bottom: 20px;">
            <strong><a href="../../../../assets/images/raspberry-pi/button.png" target="_blank" rel="noopener">Button</a></strong> (1)            
            <ul style="list-style: none; padding-left: 0; margin: 6px 0 0 0;">
                <li style="margin-bottom: 4px;">
                    <input type="checkbox" id="hw-button-wires" style="margin-right: 8px;">
                    <label for="hw-button-wires"><a href="../../../../assets/images/raspberry-pi/male-to-female-jump-wire.png" target="_blank" rel="noopener">Male to Female jumper wires</a> (2: 1 ground, 1 signal)</label>
                </li>
            </ul>
        </div>

        <!-- LEDs Section -->
        <div style="margin-bottom: 20px;">
            <strong><a href="../../../../assets/images/raspberry-pi/led.png" target="_blank" rel="noopener">LEDs</a></strong> (3: red, yellow, green)         
            <ul style="list-style: none; padding-left: 0; margin: 6px 0 0 0;">
                <li style="margin-bottom: 4px;">
                    <input type="checkbox" id="hw-resistors" style="margin-right: 8px;">
                    <label for="hw-resistors"><a href="../../../../assets/images/raspberry-pi/resistor-220-ohms.png" target="_blank" rel="noopener">Resistors</a> (3: 220 ohms)</label>
                </li>
                <li style="margin-bottom: 4px;">
                    <input type="checkbox" id="hw-led-wires" style="margin-right: 8px;">
                    <label for="hw-led-wires"><a href="../index.html" target="_blank" rel="noopener">Male to Female jumper wires</a> (4: 1 ground, 3 signal)</label>
                </li>
            </ul>
        </div>
    </div>

    <button id="copyBtn" class="copy-btn" style="margin-top: 15px;">
        📋 Copy Python Script
    </button>

    <div class="video-container">
        <video controls autoplay loop playsinline>
            <source src="../../../assets/video/pi-traffic-light.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script src="../../../js/raspberry-pi/copy-python-script.js"></script>
</body>
</html>
