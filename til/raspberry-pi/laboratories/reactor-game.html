<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; media-src 'self' data:;">

    <link rel="canonical" href="https://torischuyler.github.io/til/raspberry-pi/laboratories/reactor-game.html">
    <title>Reactor Game</title>
    <link rel="icon" href="../../../favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="../../../apple-touch-icon.png">
    <link rel="stylesheet" href="../../../css/platonic-solids.css">
</head>
<body class="page-main">
    <a href="../">&larr; Back to the Main Raspberry Pi Page</a>

    <h1>Reactor Game</h1>

    <!-- Hardware Checklist -->
    <div style="margin-bottom: 25px;">
        <h3 style="margin-bottom: 12px; border-bottom: 2px solid #333; padding-bottom: 4px; display: inline-block;">Hardware I used on Breadboard:</h3>

        <!-- Button Section -->
        <div style="margin-bottom: 20px;">
            <strong><a href="../../../../assets/images/raspberry-pi/button.png" target="_blank" rel="noopener">Buttons</a></strong> (2)            
            <ul style="list-style: none; padding-left: 0; margin: 6px 0 0 0;">
                <li style="margin-bottom: 4px;">
                    <input type="checkbox" id="hw-button-wires" style="margin-right: 8px;">
                    <label for="hw-button-wires"><a href="../../../../assets/images/raspberry-pi/male-to-female-jump-wire.png" target="_blank" rel="noopener">Male to Female jumper wires</a> (4 total: 2 ground pins 6 and 39, 2 signal pins: GPIO 14 and GPIO 18; see <a href="https://pinout.xyz" target="_blank" rel="noopener">pinout.xyz</a>)</label>
                </li>
            </ul>
        </div>

        <!-- LEDs Section -->
        <div style="margin-bottom: 20px;">
            <strong><a href="../../../../assets/images/raspberry-pi/led.png" target="_blank" rel="noopener">LED</a></strong> (1)         
            <ul style="list-style: none; padding-left: 0; margin: 6px 0 0 0;">
                <li style="margin-bottom: 4px;">
                    <input type="checkbox" id="hw-resistors" style="margin-right: 8px;">
                    <label for="hw-resistors"><a href="../../../../assets/images/raspberry-pi/resistor-220-ohms.png" target="_blank" rel="noopener">Resistor</a> (1: 220 ohms)</label>
                </li>
                <li style="margin-bottom: 4px;">
                    <input type="checkbox" id="hw-led-wires" style="margin-right: 8px;">
                    <label for="hw-led-wires"><a href="../../../../assets/images/raspberry-pi/male-to-female-jump-wire.png" target="_blank" rel="noopener">Male to Female jumper wires</a> (2 total: 1 ground pin 14, 1 signal pin GPIO 4; see <a href="https://pinout.xyz" target="_blank" rel="noopener">pinout.xyz</a>)</label>
                </li>
            </ul>
        </div>
    </div>

    <button id="copyBtn" class="copy-btn" style="margin-top: 15px;">
        📋 Copy Python Script
    </button>

    <div class="video-container">
        <video controls autoplay loop playsinline>
            <source src="../../../assets/video/reactor-game.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <img src="../../../assets/images/raspberry-pi/reaction-game-terminal-output.png" alt="Reaction game terminal output" style="max-width: 100%; display: block; margin: 20px auto 0; border: 1px solid #ccc; border-radius: 4px;">

    <script src="../../../js/raspberry-pi/copy-reactor-game-python-script.js"></script>
</body>
</html>
