<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:;">

    <link rel="canonical" href="https://torischuyler.github.io/til/pie">
    <title>Pies | TIL | Tori Schuyler</title>

    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/pie.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Righteous&family=Space+Grotesk:wght@300;400;500;600;700&display=swap">
</head>
<body>
    <nav aria-label="Page navigation">
        <ul class="nav-menu">
            <li><a href="/">whoami</a></li>
            <li><a href="/who-are-you">Who Are You?</a></li>
            <li><a href="/til" class="active" aria-current="page">TIL</a></li>
        </ul>

        <div class="nav-header">
            <div class="hamburger">☰</div>
            <button id="yin-yang-toggle" aria-label="Fun button (coming soon)"></button>
        </div>
    </nav>

    <div class="pie-container">
        <main>
            <h1>Pies</h1>

            <h2>Blueberry Pie Gen 1</h2>

            <div class="pie-slideshow" aria-label="Blueberry pie photo gallery">
                <div class="slideshow-frame">
                    <button type="button" class="slideshow-btn slideshow-prev" aria-label="Previous photo">&#8249;</button>

                    <div class="slideshow-images">
                        <img src="/assets/images/food/blueberry-pie/blueberries-one.png" alt="Blueberries" class="slideshow-image is-active" data-index="0">
                        <img src="/assets/images/food/blueberry-pie/sugar-cornstarch-two.png" alt="Sugar and cornstarch" class="slideshow-image" data-index="1" hidden>
                        <img src="/assets/images/food/blueberry-pie/milk-three.png" alt="Milk" class="slideshow-image" data-index="2" hidden>
                        <img src="/assets/images/food/blueberry-pie/filling-four.png" alt="Filling" class="slideshow-image" data-index="3" hidden>
                        <img src="/assets/images/food/blueberry-pie/blueberry-pie-five.png" alt="Blueberry pie" class="slideshow-image" data-index="4" hidden>
                        <img src="/assets/images/food/blueberry-pie/happy-blueberry-pie-six.png" alt="Happy blueberry pie" class="slideshow-image" data-index="5" hidden>
                    </div>

                    <button type="button" class="slideshow-btn slideshow-next" aria-label="Next photo">&#8250;</button>
                </div>

                <p class="slideshow-caption" id="slideshow-caption">Blueberries</p>
                <p class="slideshow-counter" id="slideshow-counter" aria-live="polite">1 / 6</p>

                <div class="pie-recipe-links">
                    <button type="button" class="pie-recipe-link" data-recipe="ingredients">Ingredients</button>
                    <button type="button" class="pie-recipe-link" data-recipe="steps">Steps</button>
                    <button type="button" class="pie-recipe-link" data-recipe="iykyk">IYKYK</button>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <p><span id="year"></span> 👾 Tori Schuyler</p>
    </footer>

    <script src="/js/stay-tuned-modal.js" defer></script>
    <script src="/js/toggles/yin-yang-toggle.js" defer></script>
    <script src="/js/mobile-nav.js" defer></script>
    <script src="/js/footer.js"></script>
    <script src="/js/pie-slideshow.js" defer></script>
    <script src="/js/pie-recipe-modal.js" defer></script>
</body>
</html>
